name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository structure and public content
        run: python scripts/validate.py

      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -LiteralPath scripts/install.ps1 -Raw))
          "PS_PARSE_OK"

      - name: Test PowerShell installer
        shell: pwsh
        run: |
          if ($IsWindows) {
            Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          }
          $homePath = Join-Path $env:RUNNER_TEMP "codex-home-ps"
          ./scripts/install.ps1 -CodexHome $homePath -DryRun
          ./scripts/install.ps1 -CodexHome $homePath
          ./scripts/install.ps1 -CodexHome $homePath -Check
          ./scripts/install.ps1 -CodexHome $homePath -Uninstall

      - name: Parse Bash installer
        if: runner.os == 'Linux'
        run: bash -n scripts/install.sh

      - name: Test Bash installer
        if: runner.os == 'Linux'
        run: |
          home_path="$RUNNER_TEMP/codex-home-bash"
          bash scripts/install.sh --codex-home "$home_path" --dry-run
          bash scripts/install.sh --codex-home "$home_path"
          bash scripts/install.sh --codex-home "$home_path" --check
          bash scripts/install.sh --codex-home "$home_path" --uninstall
